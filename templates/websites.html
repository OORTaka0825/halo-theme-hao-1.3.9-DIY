<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content}, htmlType = 'page', title = ${singlePage.spec.title + ' | ' + site.title}, head = ~{::head})}">

<th:block th:fragment="head">
</th:block>

<th:block th:fragment="content">
    <div class="page" id="body-wrap">
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${singlePage.spec.title})}"></nav>
        </header>

        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <div th:replace="~{macro/author-content :: author-content-video(
                        background = ${theme.config.websites.backgroundImg},
                        video = ${ !#strings.isEmpty(theme.config.websites.backgroundVideo) ? theme.config.websites.backgroundVideo : '' },
                        smallTitle = ${theme.config.websites.smallTitle},
                        bigTitle = ${theme.config.websites.bigTitle},
                        detail = ${theme.config.websites.detail},
                        buttonUrl = '',
                        buttonTitle = ''
                )}"></div>

                <div style="height:15px;"></div>

                <div id="websites-page" th:if="${not #lists.isEmpty(theme.config.websites.category_list)}"
                     th:with="categoryList = ${theme.config.websites.category_list}">
                    <div class="websites-category" th:each="category, stat : ${categoryList}">
                        <hao-flink th:attr="name=${category.category_name}, desc=${category.description}, style=${#strings.isEmpty(category.style) ? 'default' : category.style}">
                            <div class="_tpl">
                                <span th:each="site : ${category.website_list}"
                                      th:text="|{${site.name},${site.url},${site.icon},${site.description}}|"></span>
                            </div>
                        </hao-flink>
                        <div th:if="${!stat.last}" style="height:25px;"></div>
                    </div>
                </div>

                <style>
    /* 横幅和第一组之间的距离 */
    #websites-page {
        margin-top: 15px !important;
    }

    /* 每个分类大卡片之间的上下距离 */
    #websites-page .websites-category + .websites-category {
        margin-top: 25px !important;
    }

    /* 每个分类大卡片整体大小 */
    #websites-page .websites-category {
        margin-bottom: 0 !important;
    }

    #websites-page .websites-category .flink,
    #websites-page .websites-category #article-container,
    #websites-page .websites-category .flink#article-container {
        width: 100% !important;
        margin: 0 !important;
        padding: 0px 0px 0px 7px !important;
        min-height: auto !important;
        box-sizing: border-box !important;
        border-radius: 12px !important;
    }

    /* 分类标题区域不要撑太高 */
    #websites-page .flink-name,
    #websites-page h2,
    #websites-page .flink-title {
        margin-top: 0 !important;
        margin-bottom: 8px !important;
        line-height: 1.2 !important;
    }

    #websites-page .flink-desc,
    #websites-page .flink-description {
        margin: 0 0 12px 0 !important;
        line-height: 1.4 !important;
    }

    /* 网站卡片区域不要上下留太大空白 */
    #websites-page .flink-list {
        margin-top: 8px !important;
        margin-bottom: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        min-height: auto !important;
    }

    /* 如果主题给每个网站小卡片加了大外边距，这里压小一点 */
    #websites-page .flink-list-item {
        margin-top: 6px !important;
        margin-bottom: 6px !important;
    }
</style>

                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = ${singlePage.metadata.name},
                  allowComment = ${singlePage.spec.allowComment})}"/>
            </div>
        </main>

        <footer th:replace="~{modules/footer :: footer}"></footer>
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>
</th:block>
</html>
