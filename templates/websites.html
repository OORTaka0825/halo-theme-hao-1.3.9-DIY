<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content}, htmlType = 'page', title = ${singlePage.spec.title + ' | ' + site.title}, head = ~{::head})}">

<th:block th:fragment="head">
</th:block>

<th:block th:fragment="content">
    <div class="page" id="body-wrap">
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${singlePage.spec.title})}"></nav>
        </header>

        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <div th:replace="~{macro/author-content :: author-content-video(
                        background = ${theme.config.websites.backgroundImg},
                        video = ${ !#strings.isEmpty(theme.config.websites.backgroundVideo) ? theme.config.websites.backgroundVideo : '' },
                        smallTitle = ${theme.config.websites.smallTitle},
                        bigTitle = ${theme.config.websites.bigTitle},
                        detail = ${theme.config.websites.detail},
                        buttonUrl = '',
                        buttonTitle = ''
                )}"></div>

                <div style="height:15px;"></div>

                <div id="websites-page" th:if="${not #lists.isEmpty(theme.config.websites.category_list)}"
                     th:with="categoryList = ${theme.config.websites.category_list}">
                    <div class="websites-category" th:each="category, stat : ${categoryList}">
                        <hao-flink th:attr="name=${category.category_name}, desc=${category.description}, style=${#strings.isEmpty(category.style) ? 'default' : category.style}">
                            <div class="_tpl">
                                <span th:each="site : ${category.website_list}"
                                      th:text="|{${site.name},${site.url},${site.icon},${site.description}}|"></span>
                            </div>
                        </hao-flink>
                        <div th:if="${!stat.last}" style="height:25px;"></div>
                    </div>
                </div>

                <style>
    /* 在线网站页面整体 */
    #websites-page {
        margin-top: 15px;
    }

    /* 每组网站之间的距离，对应你原来手写的 25px 间距 */
    #websites-page .websites-category + .websites-category {
        margin-top: 25px;
    }

    #websites-page .flink {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
    }

    /* 分组标题和描述稍微压紧一点 */
    #websites-page .flink#article-container .flink-name {
        margin-bottom: 6px;
    }

    #websites-page .flink#article-container .flink-desc {
        margin: 0 0 10px 0 !important;
    }

    /* 卡片列表：改成 flex，避免主题默认 float 导致尺寸偏大 */
    #websites-page .flink#article-container .flink-list {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 10px !important;
        padding: 8px 10px 12px 10px !important;
        margin: 0 !important;
        overflow: visible !important;
        text-align: left !important;
    }

    /* 网站卡片尺寸：这里控制你圈出来的那些卡片大小 */
    #websites-page .flink#article-container .flink-list > .flink-list-item {
        float: none !important;
        width: 190px !important;
        height: 64px !important;
        margin: 0 !important;
        flex: 0 0 190px !important;
        border-radius: 10px !important;
    }

    /* 卡片内部链接铺满 */
    #websites-page .flink#article-container .flink-list > .flink-list-item a {
        display: flex !important;
        align-items: center !important;
        width: 100% !important;
        height: 100% !important;
        padding: 0 !important;
    }

    /* 网站图标大小 */
    #websites-page .flink#article-container .flink-list > .flink-list-item a img.flink-avatar {
        width: 44px !important;
        height: 44px !important;
        min-width: 44px !important;
        min-height: 44px !important;
        margin: 10px 12px 10px 12px !important;
        border-radius: 50% !important;
    }

    /* 右侧文字区域 */
    #websites-page .flink-list-item .flink-item-info {
        width: calc(100% - 68px) !important;
        justify-content: center !important;
    }

    /* 网站名称 */
    #websites-page .flink#article-container .flink-list > .flink-list-item a .flink-item-name {
        font-size: 15px !important;
        line-height: 18px !important;
        padding: 0 !important;
        max-width: 100% !important;
    }

    /* 网站描述，只显示一行，避免卡片被撑大 */
    #websites-page .flink#article-container .flink-list > .flink-list-item a .flink-item-desc {
        font-size: 12px !important;
        line-height: 16px !important;
        height: 16px !important;
        padding: 2px 0 0 0 !important;
        -webkit-line-clamp: 1 !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }

    /* 关闭 hover 时图片缩没的效果，不然小卡片会跳动 */
    #websites-page .flink#article-container .flink-list > .flink-list-item:hover a img.flink-avatar {
        width: 44px !important;
        height: 44px !important;
        min-width: 44px !important;
        min-height: 44px !important;
        opacity: 1 !important;
        margin: 10px 12px 10px 12px !important;
    }

    #websites-page .flink-list-item:hover .flink-item-info {
        min-width: auto !important;
        width: calc(100% - 68px) !important;
    }

    /* 移动端：一行一个，避免太挤 */
    @media screen and (max-width: 768px) {
        #websites-page .flink#article-container .flink-list > .flink-list-item {
            width: 100% !important;
            flex: 0 0 100% !important;
        }
    }
</style>

                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = ${singlePage.metadata.name},
                  allowComment = ${singlePage.spec.allowComment})}"/>
            </div>
        </main>

        <footer th:replace="~{modules/footer :: footer}"></footer>
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>
</th:block>
</html>
