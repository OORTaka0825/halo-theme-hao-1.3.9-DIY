<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>
        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <th:block th:with="pageNum = ${param.page == null ? 1 : #conversions.convert(param.page, 'Integer')}">

                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="description = ${#annotations.get(group, 'description')},
                                         cover = ${#annotations.get(group, 'cover')},
                                         photoRes = ${photoFinder.listByGroupName(group.metadata.name, pageNum, 20)}">
                            <th:block th:replace="~{macro/author-content :: author-content(
                                  background = ${#strings.isEmpty(theme.config.photos.backgroundImg) ? theme.config.other.opengraph.image : theme.config.photos.backgroundImg},
                                  smallTitle = ${theme.config.photos.smallTitle},
                                  bigTitle   = ${group.spec.displayName},
                                  detail     = ${theme.config.photos.detail},
                                  buttonUrl  = '/photos',
                                  buttonTitle= '返回'
                              )}"></th:block>

                            <div class="card-album">
                                <th:block th:each="photo : ${photoRes.items}">
                                    <div class="card album-card">
                                        <div class="photo-info" th:text="${photo.spec.displayName}"></div>
                                        <img class="card_cover"
                                             th:src="${isLazyload ? loadingImg : photo.spec.url}"
                                             th:data-lazy-src="${ isLazyload ? photo.spec.url : ''}">
                                    </div>
                                </th:block>
                                <th:block th:each="p : ${photoRes.items}">
                                    <div class="album-content-nocover"></div>
                                </th:block>
                            </div>

                            <nav id="pagination" th:if="${photoRes.hasPrevious() or photoRes.hasNext()}" style="text-align: center; margin: 30px 0; display: flex; justify-content: center; align-items: center; gap: 10px;">
                                <a th:if="${photoRes.hasPrevious()}" th:href="@{/photos(group=${param.group},page=${photoRes.page - 1})}" style="padding: 10px 20px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 12px; color: var(--font-color); text-decoration: none;">上一页</a>
                                <span style="padding: 10px 20px; background: var(--heo-secondbg); border-radius: 12px; color: var(--font-color); font-weight: bold;">[[${photoRes.page}]] / [[${photoRes.totalPages}]]</span>
                                <a th:if="${photoRes.hasNext()}" th:href="@{/photos(group=${param.group},page=${photoRes.page + 1})}" style="padding: 10px 20px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 12px; color: var(--font-color); text-decoration: none;">下一页</a>
                            </nav>
                        </th:block>
                    </th:block>
                </th:block>

                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="photoRes = ${photoFinder.listByGroupName(group.metadata.name, pageNum, 20)}">
                            <div class="gallery-groups">
                                <h2 style="text-align:center;">[[${group.spec.displayName}]]</h2>
                                <div class="gallery-group-main gallery-photos">
                                    <th:block th:each="photo : ${photoRes.items}">
                                        <figure class="gallery-group">
                                            <img class="gallery-group-img"
                                                 th:src="${isLazyload ? loadingImg : photo.spec.url}"
                                                 th:data-lazy-src="${ isLazyload ? photo.spec.url : ''}"
                                                 th:alt="${photo.spec.displayName}">
                                            <figcaption>
                                                <div class="gallery-group-name">[[${photo.spec.displayName}]]</div>
                                                <p>[[${#annotations.get(photo, 'description')}]]</p>
                                                <a class="gallery-group-link" th:href="${photo.spec.url}"></a>
                                            </figcaption>
                                        </figure>
                                    </th:block>
                                </div>
                            </div>
                            
                            <nav id="pagination" th:if="${photoRes.hasPrevious() or photoRes.hasNext()}" style="text-align: center; margin: 30px 0; display: flex; justify-content: center; align-items: center; gap: 10px;">
                                <a th:if="${photoRes.hasPrevious()}" th:href="@{/photos(group=${param.group},page=${photoRes.page - 1})}" style="padding: 10px 20px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 12px; color: var(--font-color); text-decoration: none;">上一页</a>
                                <span style="padding: 10px 20px; background: var(--heo-secondbg); border-radius: 12px; color: var(--font-color); font-weight: bold;">[[${photoRes.page}]] / [[${photoRes.totalPages}]]</span>
                                <a th:if="${photoRes.hasNext()}" th:href="@{/photos(group=${param.group},page=${photoRes.page + 1})}" style="padding: 10px 20px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 12px; color: var(--font-color); text-decoration: none;">下一页</a>
                            </nav>
                        </th:block>
                    </th:block>
                </th:block>

                </th:block> <style>
                    .gallery-groups {
                        box-shadow: var(--heo-shadow-border);
                        padding: 1rem 2rem;
                        border-radius: 12px;
                        background: var(--heo-card-bg);
                        border: var(--style-border);
                        width: 100%;
                        align-self: flex-start;
                        animation: slide-in 0.6s 0.1s backwards;
                    }

                    :root {
                        --album-background-dark: #2d3548;
                        --album-text-light: rgba(255, 255, 255, 0.6);
                        --album-text-lighter: rgba(255, 255, 255, 0.9);
                        --album-spacing-s: 8px;
                        --album-spacing-m: 16px;
                        --album-spacing-l: 24px;
                        --album-spacing-xl: 32px;
                        --album-spacing-xxl: 64px
                    }

                    #album .card-album {
                        width: 100%;
                        display: flex;
                        flex-wrap: wrap;
                        justify-content: space-between;
                        margin: var(--album-spacing-xxl) 0 0
                    }

                    #album .card-album .album-content-nocover {
                        width: calc(100% / 4 - 40px)
                    }

                    #album .card-album .card {
                        list-style: none;
                        position: relative;
                        display: flex;
                        width: calc(100% / 4 - 10px);
                        padding: 10px
                    }

                    #album .card-album .card:hover {
                        cursor: pointer
                    }

                    #album .card_cover {
                        border-radius: var(--album-spacing-l);
                        filter: brightness(.75) saturate(1.2) contrast(.85);
                        transform-origin: center;
                        transform: scale(1) translateZ(0);
                        transition: filter .2s linear, transform .2s linear;
                        max-width: 100%;
                        overflow: hidden;
                        height: 550px;
                        width: 100%;
                        max-width: 100%;
                        object-fit: cover;
                        border-radius: var(--album-spacing-l)
                    }

                    #album .card:hover .card_cover {
                        transform: scale(1.05) translateZ(0);
                        filter: brightness(.9) saturate(1.2) contrast(1)
                    }

                    #album .card-album:hover > .card:not(:hover) .card_cover {
                        filter: brightness(.5) saturate(.9) contrast(1.2) blur(20px)
                    }

                    #album .card__content {
                        left: 0;
                        padding: var(--album-spacing-l);
                        position: absolute;
                        top: 0
                    }

                    #album .card__category {
                        color: var(--album-text-light);
                        font-size: .8rem;
                        margin-bottom: var(--album-spacing-s);
                        text-transform: uppercase
                    }

                    #album .card__heading {
                        color: var(--album-text-lighter);
                        font-size: 1.5rem;
                        text-shadow: 2px 2px 20px rgba(0, 0, 0, .2);
                        line-height: 1.4;
                        word-spacing: 100vw
                    }

                    #album .photo-info {
                        position: absolute;
                        left: 8px;
                        top: 8px;
                        padding: 4px 6px;
                        border-radius: 8px;
                        background: var(--heo-black-op);
                        font-size: 12px;
                        color: var(--heo-white);
                        transition: .3s;
                        z-index: 1;
                        user-select: none
                    }

                    #album .card:hover .photo-info {
                        opacity: 0
                    }

                    @media (min-width: 1024px) {
                        #album img.card_cover {
                            height: 600px
                        }
                    }

                    @media (max-width: 960px) {
                        #album .card-album .card {
                            width: calc(100% / 2 - 40px)
                        }
                    }

                    @media (max-width: 540px) {
                        #album .card-album .card {
                            width: 100%
                        }
                    }

                    img {
                        border-style: none;
                        border-radius: 8px;
                        max-width: 100%;
                        transition: all .2s ease 0s;
                        -webkit-user-drag: none;
                        -khtml-user-drag: none;
                        -moz-user-drag: none;
                        -ms-user-drag: none;
                        user-drag: none
                    }
                </style>
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />
            </div>

        </main>
        <footer th:replace="~{modules/footer :: footer}"></footer>
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>

</th:block>

</html>
