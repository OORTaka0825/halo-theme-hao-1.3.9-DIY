<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>

        <main class="layout hide-aside" id="content-inner">
            <div id="page">

                <!-- 默认模式 -->
                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">

                    <!-- 头图保持不动 -->
                    <th:block th:if="${#strings.isEmpty(param.group)}"
                              th:with="background = ${theme.config.photos.backgroundImg}">
                        <div class="author-content author-content-item essayPage single"
                             th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                            <div class="card-content">
                                <div class="author-content-item-tips">相册集</div>
                                <span class="author-content-item-title">全部</span>
                            </div>
                        </div>
                    </th:block>

                    <!-- 图片区域 -->
                    <div id="article-container">
                        <section class="page-1 loadings">
                            <div class="type-gallery ">
                                <div class="gallery" id="gallery-list">

                                    <!-- ✅ 加 class -->
                                    <div class="fj-gallery-item gallery-item" th:each="photo : ${photos.items}">
                                        <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                                            [[${photo.spec.displayName}]]
                                        </div>
                                        <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}"
                                             th:title="${photo.spec.description}">
                                    </div>

                                </div>
                            </div>
                        </section>

                        <!-- ✅ 分页 -->
                        <div class="pagination-box">
                            <button id="prevPage">上一页</button>
                            <span id="pageInfo"></span>
                            <button id="nextPage">下一页</button>
                        </div>
                    </div>
                </th:block>


                <!-- one 模式 -->
                <div class="gallery-groups" th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">

                    <div id="article-container">
                        <section class="page-1 loadings">
                            <div class="type-gallery ">
                                <div class="gallery" id="gallery-list-2">

                                    <!-- ✅ 同样加 class -->
                                    <div class="fj-gallery-item gallery-item" th:each="photo : ${photos.items}">
                                        <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                                            [[${photo.spec.displayName}]]
                                        </div>
                                        <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}"
                                             th:title="${photo.spec.description}">
                                    </div>

                                </div>
                            </div>
                        </section>

                        <!-- ✅ 分页 -->
                        <div class="pagination-box">
                            <button id="prevPage2">上一页</button>
                            <span id="pageInfo2"></span>
                            <button id="nextPage2">下一页</button>
                        </div>
                    </div>
                </div>

                <!-- 原样式 + 新分页样式 -->
                <style>
                    .pagination-box {
                        margin-top: 20px;
                        text-align: center;
                    }

                    .pagination-box button {
                        padding: 8px 16px;
                        margin: 0 10px;
                        border-radius: 6px;
                        border: none;
                        background: var(--heo-main);
                        color: #fff;
                        cursor: pointer;
                    }

                    .pagination-box button:disabled {
                        opacity: 0.5;
                    }
                </style>

                <!-- 评论 -->
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />

            </div>
        </main>

        <footer th:replace="~{modules/footer :: footer}"></footer>

        <!-- ✅ 分页JS -->
        <script>
            function initPagination(containerSelector, prevBtn, nextBtn, info) {
                const pageSize = 20;
                const items = document.querySelectorAll(containerSelector + " .gallery-item");

                let currentPage = 1;
                const totalPages = Math.ceil(items.length / pageSize);

                function showPage(page) {
                    items.forEach((item, index) => {
                        item.style.display =
                            index >= (page - 1) * pageSize &&
                            index < page * pageSize
                                ? "block"
                                : "none";
                    });

                    document.getElementById(info).innerText =
                        page + " / " + totalPages;

                    document.getElementById(prevBtn).disabled = page === 1;
                    document.getElementById(nextBtn).disabled = page === totalPages;
                }

                document.getElementById(prevBtn).onclick = () => {
                    if (currentPage > 1) {
                        currentPage--;
                        showPage(currentPage);
                    }
                };

                document.getElementById(nextBtn).onclick = () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        showPage(currentPage);
                    }
                };

                showPage(currentPage);
            }

            document.addEventListener("DOMContentLoaded", function () {
                if (document.getElementById("gallery-list")) {
                    initPagination("#gallery-list", "prevPage", "nextPage", "pageInfo");
                }
                if (document.getElementById("gallery-list-2")) {
                    initPagination("#gallery-list-2", "prevPage2", "nextPage2", "pageInfo2");
                }
            });
        </script>

    </div>

</th:block>
</html>
