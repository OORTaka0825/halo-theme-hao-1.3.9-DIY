<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <!-- 头部导航栏 -->
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>
        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="description = ${#annotations.get(group, 'description')},
                         background = ${#annotations.get(group, 'background')}">
                            <div class="author-content author-content-item essayPage single"
                                 th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                                <div class="card-content">
                                    <div class="author-content-item-tips">相册集</div>
                                    <span class="author-content-item-title" th:text="${group.spec.displayName}"></span>
                                    <div class="content-bottom">
                                        <div class="tips" th:text="${description}"></div>
                                    </div>
                                    <div class="banner-button-group">
                                        <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                    </th:block>
                    <th:block th:if="${#strings.isEmpty(param.group)}"
                              th:with="background = ${theme.config.photos.backgroundImg}">
                        <div class="author-content author-content-item essayPage single"
                             th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                            <div class="card-content">
                                <div class="author-content-item-tips">相册集</div>
                                <span class="author-content-item-title">全部</span>
                                <div class="content-bottom">
                                    <div class="tips"></div>
                                </div>
                                <div class="banner-button-group">
                                    <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                </div>
                            </div>
                        </div>
                    </th:block>
                <div id="article-container" th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <section class="page-1 loadings">
                        <div class="type-gallery">
                            <div class="gallery" th:with="pageSize=20, pageNum=${param.page == null ? 1 : #conversions.convert(param.page, 'Integer')}, startIdx=${(pageNum - 1) * pageSize}, endIdx=${pageNum * pageSize}">
                                <div class="fj-gallery-item" th:each="photo, stat : ${photos.items}" th:if="${stat.index >= startIdx and stat.index < endIdx}">
                                    <div th:if="${theme.config.photos.tagEnable}" class="tag-address">[[${photo.spec.displayName}]]</div>
                                    <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}" th:title="${photo.spec.description}">
                                </div>
                            </div>
                        </div>
                    </section>
                    <div class="pagination-nav" th:if="${photos.total > 20}" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0;">
                        <th:block th:with="pNum=${param.page == null ? 1 : #conversions.convert(param.page, 'Integer')}, tPages=${(photos.total + 19) / 20}">
                            <a th:if="${pNum > 1}" th:href="@{/photos(group=${param.group},page=${pNum - 1})}" style="padding: 8px 16px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 8px; color: var(--font-color);">上一页</a>
                            <span style="font-weight: bold;">[[${pNum}]] / [[${#numbers.formatDecimal(tPages, 0, 0)}]]</span>
                            <a th:if="${pNum < tPages}" th:href="@{/photos(group=${param.group},page=${pNum + 1})}" style="padding: 8px 16px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 8px; color: var(--font-color);">下一页</a>
                        </th:block>
                    </div>
                </div>

                <div class="gallery-groups" th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <h1 style="margin: 8px 0px 20px" th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group) }">
                            [[${group.spec.displayName}]]
                        </h1>
                        <h1 style="margin: 8px 0px 20px" th:if="${#strings.isEmpty(param.group) }">全部</h1>
                    </th:block>
                    <div id="article-container">
                        <section class="page-1 loadings">
                            <div class="type-gallery">
                                <div class="gallery" th:with="pageSize=20, pageNum=${param.page == null ? 1 : #conversions.convert(param.page, 'Integer')}, startIdx=${(pageNum - 1) * pageSize}, endIdx=${pageNum * pageSize}">
                                    <div class="fj-gallery-item" th:each="photo, stat : ${photos.items}" th:if="${stat.index >= startIdx and stat.index < endIdx}">
                                        <div th:if="${theme.config.photos.tagEnable}" class="tag-address">[[${photo.spec.displayName}]]</div>
                                        <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}" th:title="${photo.spec.description}">
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                    <div class="pagination-nav" th:if="${photos.total > 20}" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0;">
                        <th:block th:with="pNum=${param.page == null ? 1 : #conversions.convert(param.page, 'Integer')}, tPages=${(photos.total + 19) / 20}">
                            <a th:if="${pNum > 1}" th:href="@{/photos(group=${param.group},page=${pNum - 1})}" style="padding: 8px 16px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 8px; color: var(--font-color);">上一页</a>
                            <span style="font-weight: bold;">[[${pNum}]] / [[${#numbers.formatDecimal(tPages, 0, 0)}]]</span>
                            <a th:if="${pNum < tPages}" th:href="@{/photos(group=${param.group},page=${pNum + 1})}" style="padding: 8px 16px; background: var(--heo-card-bg); border: var(--style-border); border-radius: 8px; color: var(--font-color);">下一页</a>
                        </th:block>
                    </div>
                </div>
                <!--/* 评论组件 */-->
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />
            </div>

        </main>
        <!-- 底部 -->
        <footer th:replace="~{modules/footer :: footer}"></footer>
        <!-- 卡片顶部气泡效果 -->
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>

</th:block>

</html>
