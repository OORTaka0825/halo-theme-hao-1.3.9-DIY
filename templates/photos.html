<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <!-- 头部导航栏 -->
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>
        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="description = ${#annotations.get(group, 'description')},
                         background = ${#annotations.get(group, 'background')}">
                            <div class="author-content author-content-item essayPage single"
                                 th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                                <div class="card-content">
                                    <div class="author-content-item-tips">相册集</div>
                                    <span class="author-content-item-title" th:text="${group.spec.displayName}"></span>
                                    <div class="content-bottom">
                                        <div class="tips" th:text="${description}"></div>
                                    </div>
                                    <div class="banner-button-group">
                                        <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                    </th:block>
                    <th:block th:if="${#strings.isEmpty(param.group)}"
                              th:with="background = ${theme.config.photos.backgroundImg}">
                        <div class="author-content author-content-item essayPage single"
                             th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                            <div class="card-content">
                                <div class="author-content-item-tips">相册集</div>
                                <span class="author-content-item-title">全部</span>
                                <div class="content-bottom">
                                    <div class="tips"></div>
                                </div>
                                <div class="banner-button-group">
                                    <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                </div>
                            </div>
                        </div>
                    </th:block>

<div id="article-container">

    <section class="page-1 loadings">
        <div class="type-gallery">
            <div class="gallery" id="gallery-list">

                <div class="fj-gallery-item"
                     th:each="photo : ${photos.items}">

                    <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                        [[${photo.spec.displayName}]]
                    </div>

                    <img th:src="${photo.spec.url}"
                         th:alt="${photo.spec.description}"
                         th:title="${photo.spec.description}">
                </div>

            </div>
        </div>
    </section>

    <div class="pagination">
        <button id="prevPage" class="page-btn">上一页</button>
        <span id="pageInfo" class="page-info"></span>
        <button id="nextPage" class="page-btn">下一页</button>
    </div>

</div>

</th:block>

<div class="gallery-groups" th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">

    <div id="article-container">

        <section class="page-1 loadings">
            <div class="type-gallery">
                <div class="gallery" id="gallery-list-2">

                    <div class="fj-gallery-item"
                         th:each="photo : ${photos.items}">

                        <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                            [[${photo.spec.displayName}]]
                        </div>

                        <img th:src="${photo.spec.url}"
                             th:alt="${photo.spec.description}"
                             th:title="${photo.spec.description}">
                    </div>

                </div>
            </div>
        </section>

        <div class="pagination">
            <button id="prevPage2" class="page-btn">上一页</button>
            <span id="pageInfo2" class="page-info"></span>
            <button id="nextPage2" class="page-btn">下一页</button>
        </div>

    </div>

</div>

<style>

/* ===== 3列稳定布局（避免瀑布流冲突） ===== */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

/* 图片样式 */
.fj-gallery-item img {
    width: 100%;
    border-radius: 8px;
    display: block;
}

/* 分页 */
.pagination {
    text-align: center;
    margin: 30px 0;
}

.page-btn {
    padding: 8px 16px;
    margin: 0 10px;
    border-radius: 6px;
    background: var(--btn-bg);
    color: var(--btn-color);
    border: none;
    cursor: pointer;
}

.page-btn:disabled {
    opacity: 0.5;
}

/* ⭐ 关键：分页隐藏（不会破坏布局） */
.page-hidden {
    display: none !important;
}

.page-info {
    font-size: 14px;
    color: var(--heo-fontcolor);
}

</style>

<script>

window.addEventListener("load", function () {

    function initPagination(galleryId, prevId, nextId, infoId) {

        const gallery = document.getElementById(galleryId);
        if (!gallery) return;

        const items = gallery.querySelectorAll(".fj-gallery-item");

        const pageSize = 20;
        let currentPage = 1;
        const totalPages = Math.max(1, Math.ceil(items.length / pageSize));

        function refreshLayout() {
            // 强制主题重新计算布局（防止错位）
            window.dispatchEvent(new Event('resize'));
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 80);
        }

        function showPage(page) {

            currentPage = page;

            const start = (page - 1) * pageSize;
            const end = page * pageSize;

            items.forEach((item, index) => {

                if (index >= start && index < end) {
                    item.classList.remove("page-hidden");
                } else {
                    item.classList.add("page-hidden");
                }

            });

            document.getElementById(infoId).innerText =
                `第 ${currentPage} 页 / 共 ${totalPages} 页`;

            document.getElementById(prevId).disabled = currentPage === 1;
            document.getElementById(nextId).disabled = currentPage === totalPages;

            refreshLayout();
        }

        document.getElementById(prevId).onclick = function () {
            if (currentPage > 1) showPage(currentPage - 1);
        };

        document.getElementById(nextId).onclick = function () {
            if (currentPage < totalPages) showPage(currentPage + 1);
        };

        // ⭐ 延迟初始化（解决你“首次33张/按钮失效”问题）
        setTimeout(() => {
            showPage(1);
        }, 150);

    }

    initPagination("gallery-list", "prevPage", "nextPage", "pageInfo");
    initPagination("gallery-list-2", "prevPage2", "nextPage2", "pageInfo2");

});

</script>
                <!--/* 评论组件 */-->
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />
            </div>

        </main>
        <!-- 底部 -->
        <footer th:replace="~{modules/footer :: footer}"></footer>
        <!-- 卡片顶部气泡效果 -->
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>

</th:block>

</html>
