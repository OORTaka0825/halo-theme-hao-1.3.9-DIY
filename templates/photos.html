<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <!-- 头部导航栏 -->
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>
        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="description = ${#annotations.get(group, 'description')},
                         background = ${#annotations.get(group, 'background')}">
                            <div class="author-content author-content-item essayPage single"
                                 th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                                <div class="card-content">
                                    <div class="author-content-item-tips">相册集</div>
                                    <span class="author-content-item-title" th:text="${group.spec.displayName}"></span>
                                    <div class="content-bottom">
                                        <div class="tips" th:text="${description}"></div>
                                    </div>
                                    <div class="banner-button-group">
                                        <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                    </th:block>
                    <th:block th:if="${#strings.isEmpty(param.group)}"
                              th:with="background = ${theme.config.photos.backgroundImg}">
                        <div class="author-content author-content-item essayPage single"
                             th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                            <div class="card-content">
                                <div class="author-content-item-tips">相册集</div>
                                <span class="author-content-item-title">全部</span>
                                <div class="content-bottom">
                                    <div class="tips"></div>
                                </div>
                                <div class="banner-button-group">
                                    <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                </div>
                            </div>
                        </div>
                    </th:block>
                    <div id="article-container">
    <section class="page-1 loadings">
        <div class="type-gallery">
            <div class="gallery" id="my-photo-gallery">
                <div class="fj-gallery-item" th:each="photo : ${photos.items}">
                    <div th:if="${theme.config.photos.tagEnable}" class="tag-address">[[${photo.spec.displayName}]]</div>
                    <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}" th:title="${photo.spec.description}">
                </div>
            </div>
        </div>
    </section>
</div>

<div id="photo-pagination" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin: 30px 0;"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const pageSize = 20; 
    let currentPage = 1;
    const galleryContainer = document.getElementById('my-photo-gallery');
    // 注意：这里要抓取真正包含图片的子元素
    const photos = Array.from(galleryContainer.getElementsByClassName('fj-gallery-item'));
    const totalPages = Math.ceil(photos.length / pageSize);
    const paginationContainer = document.getElementById('photo-pagination');

    function showPage(page) {
        currentPage = page;
        const start = (page - 1) * pageSize;
        const end = page * pageSize;

        // 1. 先切换显示/隐藏
        photos.forEach((photo, index) => {
            if (index >= start && index < end) {
                photo.style.display = 'inline-block'; // 恢复显示
                photo.style.visibility = 'visible';
                photo.style.position = 'relative'; // 重置定位，防止堆叠
            } else {
                photo.style.display = 'none'; // 彻底移除占位
            }
        });

        // 2. 关键步骤：通知布局插件重新排列图片
        // 你的主题使用的是 fjGallery 插件
        if (typeof fjGallery === 'function') {
            fjGallery(galleryContainer, 'destroy'); // 先销毁旧布局
            fjGallery(galleryContainer, { 
                itemSelector: '.fj-gallery-item',
                gutter: 4 // 间距，根据你页面效果调整
            });
        } else if (window.fjGallery) {
            window.fjGallery.reInit(); // 如果支持重载则重载
        }

        renderButtons();
        // 翻页后平滑滚动到相册顶部
        galleryContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderButtons() {
        if (totalPages <= 1) {
            paginationContainer.innerHTML = '';
            return;
        }
        
        paginationContainer.innerHTML = `
            <button id="prevPage" ${currentPage === 1 ? 'style="visibility:hidden"' : ''} class="pagination-btn">上一页</button>
            <span style="font-weight:bold; color: var(--font-color); min-width: 50px; text-align: center;">${currentPage} / ${totalPages}</span>
            <button id="nextPage" ${currentPage === totalPages ? 'style="visibility:hidden"' : ''} class="pagination-btn">下一页</button>
        `;

        document.getElementById('prevPage')?.addEventListener('click', () => showPage(currentPage - 1));
        document.getElementById('nextPage')?.addEventListener('click', () => showPage(currentPage + 1));
    }

    // 延迟初始化，确保布局插件已经运行
    setTimeout(() => showPage(1), 500);
});
</script>

<style>
.pagination-btn {
    padding: 10px 20px;
    background: var(--heo-card-bg);
    border: var(--style-border);
    border-radius: 12px;
    color: var(--font-color);
    cursor: pointer;
    transition: 0.3s;
}
.pagination-btn:hover {
    background: var(--heo-main);
    color: white;
}
</style>
                </th:block>

                <div class="gallery-groups" th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <h1 style="margin: 8px 0px 20px" th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group) }">
                            [[${group.spec.displayName}]]
                        </h1>
                        <h1 style="margin: 8px 0px 20px" th:if="${#strings.isEmpty(param.group) }">
                            全部
                        </h1>
                    </th:block>
                    <div id="article-container">
                        <section class="page-1 loadings">
                            <div class="type-gallery ">
                                <div class="gallery">
                                    <div class="fj-gallery-item" th:each="photo : ${photos.items}">
                                        <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                                            [[${photo.spec.displayName}]]</div>
                                        <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}"
                                             th:title="${photo.spec.description}">

                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
                <style>
                    .gallery-groups {
                        box-shadow: var(--heo-shadow-border);
                        padding: 1rem 2rem;
                        border-radius: 12px;
                        background: var(--heo-card-bg);
                        border: var(--style-border);
                        width: 100%;
                        align-self: flex-start;
                        animation: slide-in 0.6s 0.1s backwards;
                    }

                    #content-inner .loadings .type-gallery {
                        opacity: 0
                    }

                    .loadings {
                        height: 60px;
                        background-position: center;
                        background-repeat: no-repeat;
                        color: #504e4e;
                        border: none;
                        background-size: auto 100%;
                        box-shadow: none;
                        background-color: inherit;
                        background-image: none;
                        background-image: url(/themes/theme-hao/assets/images/load/rotating-ball-o.svg)
                    }

                    #article-container .type-gallery {
                        overflow: hidden;
                        margin-top: 40px;
                    }

                    #content-inner .gallery {
                        margin: 0 0 16px;
                        text-align: center
                    }

                    #content-inner .gallery .fj-gallery {
                        opacity: 0;
                        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
                        filter: alpha(opacity=0)
                    }

                    #content-inner .gallery .fj-gallery .img-alt {
                        display: none
                    }

                    #content-inner .gallery .fj-gallery.lazyload+button {
                        display: inline-block
                    }

                    #content-inner .gallery .fj-gallery .gallery-data {
                        opacity: 0;
                        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
                        filter: alpha(opacity=0);
                        visibility: hidden
                    }

                    #content-inner .gallery button {
                        display: none;
                        margin-top: 25px;
                        padding: 10px;
                        width: 9em;
                        border-radius: 5px;
                        background: var(--btn-bg);
                        color: var(--btn-color);
                        font-weight: 700;
                        font-size: 1.1em;
                        -webkit-transition: all .3s;
                        -moz-transition: all .3s;
                        -o-transition: all .3s;
                        -ms-transition: all .3s;
                        transition: all .3s
                    }

                    #content-inner .gallery button>* {
                        -webkit-transition: all .4s;
                        -moz-transition: all .4s;
                        -o-transition: all .4s;
                        -ms-transition: all .4s;
                        transition: all .4s
                    }

                    #content-inner .gallery button i {
                        opacity: 1;
                        -ms-filter: none;
                        filter: none;
                        font-size: 1.1rem
                    }

                    #content-inner .gallery button:hover {
                        background: var(--btn-hover-color)
                    }

                    #content-inner .gallery button:hover i {
                        margin-left: 2px
                    }

                    #article-container .tag-address {
                        display: flex;
                        position: absolute;
                        left: 8px;
                        top: 8px;
                        padding: 4px 6px;
                        border-radius: 8px;
                        background: var(--heo-black-op);
                        font-size: 12px;
                        color: var(--heo-white);
                        transition: .3s;
                        z-index: 1;
                        user-select: none
                    }

                    img {
                        border-style: none;
                        border-radius: 8px;
                        max-width: 100%;
                        transition: all .2s ease 0s;
                        -webkit-user-drag: none;
                        -khtml-user-drag: none;
                        -moz-user-drag: none;
                        -ms-user-drag: none;
                        -user-drag: none
                    }
                </style>
                <!--/* 评论组件 */-->
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />
            </div>

        </main>
        <!-- 底部 -->
        <footer th:replace="~{modules/footer :: footer}"></footer>
        <!-- 卡片顶部气泡效果 -->
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>

</th:block>

</html>
