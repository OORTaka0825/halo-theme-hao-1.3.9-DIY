<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layouts/layout :: layout(content = ~{::content},htmlType = 'photos',title = ${title + ' | ' + site.title}, head = ~{::head},_title = ${title})}">
<th:block th:fragment="head">
    <th:block th:replace="~{modules/common/open-graph :: open-graph(_title = ${_title},
                _permalink = '/photos',
                _cover = ${theme.config.other.opengraph.image},
                _excerpt = ${site.seo.description},
                _type = 'website')}"></th:block>
</th:block>
<th:block th:fragment="content">

    <div class="page" id="body-wrap">
        <!-- 头部导航栏 -->
        <header class="not-top-img" id="page-header">
            <nav th:replace="~{modules/nav :: nav(title = ${_title})}"></nav>
        </header>
        <main class="layout hide-aside" id="content-inner">
            <div id="page">
                <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'default')}">
                    <th:block th:each="group : ${photoFinder.groupBy()}">
                        <th:block
                                th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group)}"
                                th:with="description = ${#annotations.get(group, 'description')},
                         background = ${#annotations.get(group, 'background')}">
                            <div class="author-content author-content-item essayPage single"
                                 th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                                <div class="card-content">
                                    <div class="author-content-item-tips">相册集</div>
                                    <span class="author-content-item-title" th:text="${group.spec.displayName}"></span>
                                    <div class="content-bottom">
                                        <div class="tips" th:text="${description}"></div>
                                    </div>
                                    <div class="banner-button-group">
                                        <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                    </th:block>
                    <th:block th:if="${#strings.isEmpty(param.group)}"
                              th:with="background = ${theme.config.photos.backgroundImg}">
                        <div class="author-content author-content-item essayPage single"
                             th:style="'background:url('+${background}+') left 28% / cover no-repeat !important;'">
                            <div class="card-content">
                                <div class="author-content-item-tips">相册集</div>
                                <span class="author-content-item-title">全部</span>
                                <div class="content-bottom">
                                    <div class="tips"></div>
                                </div>
                                <div class="banner-button-group">
                                    <a class="banner-button" th:href="${theme.config.photos.topLink}">
  <i class="haofont hao-icon-circle-arrow-right"></i>
  <span class="banner-button-text">返回</span>
</a>
                                </div>
                            </div>
                        </div>
                    </th:block>
                    <div id="article-container" th:class="${#strings.equals(theme.config.photos.photosStyle, 'default') ? '' : 'gallery-groups'}">
                    <th:block th:if="${#strings.equals(theme.config.photos.photosStyle, 'one')}">
                        <th:block th:each="group : ${photoFinder.groupBy()}">
                            <h1 style="margin: 8px 0px 20px" th:if="${#strings.equals(group.metadata.name, param.group) && not #strings.isEmpty(param.group) }">
                                [[${group.spec.displayName}]]
                            </h1>
                            <h1 style="margin: 8px 0px 20px" th:if="${#strings.isEmpty(param.group) }">全部</h1>
                        </th:block>
                    </th:block>

                    <section class="page-1 loadings">
                        <div class="type-gallery">
                            <div class="gallery" id="photo-pagination-container">
                                <div class="fj-gallery-item" th:each="photo : ${photos.items}">
                                    <div th:if="${theme.config.photos.tagEnable}" class="tag-address">
                                        [[${photo.spec.displayName}]]</div>
                                    <img th:src="${photo.spec.url}" th:alt="${photo.spec.description}"
                                         th:title="${photo.spec.description}">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div id="photo-page-ctrl" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin: 30px 0; min-height: 50px;"></div>

                <script>
                (function() {
                    function initPhotoPagination() {
                        const container = document.getElementById('photo-pagination-container');
                        if (!container) return;

                        // 1. 获取所有图片并物理移出 DOM，存在内存里，防止插件乱排版
                        const items = Array.from(container.getElementsByClassName('fj-gallery-item'));
                        if (items.length <= 20) return; // 不满20张不执行

                        const pageSize = 20;
                        const totalPages = Math.ceil(items.length / pageSize);
                        let curPage = 1;

                        function showPage(page) {
                            curPage = page;
                            // 彻底清空容器，让布局插件彻底复位
                            container.innerHTML = '';
                            
                            const start = (page - 1) * pageSize;
                            const end = Math.min(start + pageSize, items.length);

                            // 2. 物理插入当前页需要的图片
                            for (let i = start; i < end; i++) {
                                container.appendChild(items[i]);
                            }

                            // 3. 强制销毁并重启布局插件 (fjGallery)
                            if (window.fjGallery) {
                                try {
                                    fjGallery(container, 'destroy');
                                    setTimeout(() => {
                                        fjGallery(container, { itemSelector: '.fj-gallery-item', gutter: 4 });
                                    }, 100);
                                } catch(e) { console.error("布局重绘失败", e); }
                            }

                            renderBtns();
                            window.scrollTo({top: container.offsetTop - 100, behavior: 'smooth'});
                        }

                        function renderBtns() {
                            const ctrl = document.getElementById('photo-page-ctrl');
                            ctrl.innerHTML = `
                                <button id="photo-prev" class="heo-btn" ${curPage === 1 ? 'disabled style="opacity:0.3;cursor:not-allowed"' : ''}>上一页</button>
                                <span style="font-weight:bold;color:var(--font-color)">${curPage} / ${totalPages}</span>
                                <button id="photo-next" class="heo-btn" ${curPage === totalPages ? 'disabled style="opacity:0.3;cursor:not-allowed"' : ''}>下一页</button>
                            `;
                            document.getElementById('photo-prev').onclick = () => curPage > 1 && showPage(curPage - 1);
                            document.getElementById('photo-next').onclick = () => curPage < totalPages && showPage(curPage + 1);
                        }

                        showPage(1);
                    }

                    // 确保在插件运行后执行，也要兼顾 PJAX
                    window.addEventListener('load', initPhotoPagination);
                    document.addEventListener('pjax:complete', initPhotoPagination);
                    // 立即尝试执行一次
                    if (document.readyState === 'complete') initPhotoPagination();
                })();
                </script>

                <style>
                    .heo-btn {
                        padding: 10px 20px;
                        background: var(--heo-card-bg);
                        border: var(--style-border);
                        border-radius: 12px;
                        color: var(--font-color);
                        cursor: pointer;
                        transition: 0.3s;
                    }
                    .heo-btn:hover:not([disabled]) {
                        background: var(--heo-main);
                        color: white;
                    }
                    /* 保持原有样式 */
                    .gallery-groups {
                        box-shadow: var(--heo-shadow-border);
                        padding: 1rem 2rem;
                        border-radius: 12px;
                        background: var(--heo-card-bg);
                        border: var(--style-border);
                        width: 100%;
                        align-self: flex-start;
                        animation: slide-in 0.6s 0.1s backwards;
                    }
                    .loadings { height: 60px; background-position: center; background-repeat: no-repeat; background-image: url(/themes/theme-hao/assets/images/load/rotating-ball-o.svg); }
                    #article-container .type-gallery { overflow: hidden; margin-top: 40px; }
                    #content-inner .gallery { margin: 0 0 16px; text-align: center; }
                    #article-container .tag-address { display: flex; position: absolute; left: 8px; top: 8px; padding: 4px 6px; border-radius: 8px; background: var(--heo-black-op); font-size: 12px; color: var(--heo-white); z-index: 1; }
                    img { border-style: none; border-radius: 8px; max-width: 100%; transition: all .2s ease 0s; user-drag: none; }
                </style>
                <!--/* 评论组件 */-->
                <th:block th:replace="~{modules/comment :: comment(group = 'content.halo.run',
                  kind = 'SinglePage',
                  name = 'photos',
                  allowComment = true)}" />
            </div>

        </main>
        <!-- 底部 -->
        <footer th:replace="~{modules/footer :: footer}"></footer>
        <!-- 卡片顶部气泡效果 -->
        <script th:if="${theme.config.other.bubbleEnable}" async data-pjax
                th:src="${assets_link + '/libs/canvas/bubble.js'}"></script>
    </div>

</th:block>

</html>
