<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<nav id="pagination" th:fragment="page">
    <div class="pagination" th:with="
        /* 1. 尝试从不同来源抓取路径：参数优先，否则找分类/标签的 permalink */
        actualPath = ${path ?: (category != null ? category.status.permalink : (tag != null ? tag.status.permalink : (isIndex ? '/' : '')))},
        /* 2. 尝试抓取分页信息：pageInfo 优先，否则找全局的 posts */
        actualPageInfo = ${pageInfo ?: posts},
        /* 3. 确定是否为主页 */
        actualIsIndex = ${isIndex ?: (category == null && tag == null)},
        /* 4. 路径拼接逻辑 */
        paths = ${actualIsIndex ? (actualPath == '/' ? '/' : actualPath + '/') : actualPath}">

        <th:block th:if="${actualPageInfo != null}">

            <th:block th:if="${actualPageInfo.page > 3}">
                <a class="page-number" th:href="${paths}" th:text="1" onclick="scrollToPost()"></a>
                <span class="space" th:if="${actualPageInfo.page != 4}">…</span>
            </th:block>

            <th:block th:each="index : ${#numbers.sequence(actualPageInfo.page - 2, actualPageInfo.page + 2)}">
                <span class="page-number current" th:if="${actualPageInfo.page == index}" th:text="${actualPageInfo.page}"></span>
                <a class="page-number" th:unless="${actualPageInfo.page == index}"
                   th:if="${index > 0 && index <= actualPageInfo.totalPages}"
                   th:href="${index == 1 ? paths : actualPath + '/page/' + index}"
                   th:text="${index}"
                   onclick="scrollToPost()"></a>
            </th:block>

            <th:block th:if="${actualPageInfo.totalPages - actualPageInfo.page > 2}">
                <span class="space" th:if="${actualPageInfo.totalPages - actualPageInfo.page != 3}">…</span>
                <a class="page-number"
                   th:href="${actualPath + '/page/' + actualPageInfo.totalPages}"
                   th:text="${actualPageInfo.totalPages}"
                   onclick="scrollToPost()"></a>
            </th:block>

            <a class="extend prev" rel="prev" th:if="${actualPageInfo.hasPrevious}" th:href="${actualPageInfo.prevUrl}" onclick="scrollToPost()">
                <i class="haofont hao-icon-chevron-left fa-fw"></i>
                <div class="pagination_tips_prev">上页</div>
            </a>

            <a class="extend next" rel="next" th:if="${actualPageInfo.hasNext}" th:href="${actualPageInfo.nextUrl}" onclick="scrollToPost()">
                <div class="pagination_tips_next">下页</div>
                <i class="haofont hao-icon-chevron-right fa-fw"></i>
            </a>

            <div th:if="${actualPageInfo.totalPages > 1 && actualIsIndex}" class="toPageGroup">
                <input id="toPageText" maxlength="3" oninput="value=value.replace(/[^0-9]/g,'')">
                <a id="toPageButton" onclick="heo.toPage();scrollToPost();"><i class="haofont hao-icon-angles-right"></i></a>
            </div>
        </th:block>
    </div>

    <script th:inline="javascript">
        function scrollToPost() {
            setTimeout(function(){
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 500);
        }
    </script>
</nav>
</html>
