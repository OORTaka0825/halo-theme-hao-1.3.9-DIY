<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="post-list"
          th:with='postItems=${posts.items},
          path = ${path ?: (isIndex ? "/" : (category != null ? category.status.permalink : (tag != null ? tag.status.permalink : "/")))},
          postRandomImg=${#strings.contains(theme.config.layout.postRandomImg,"?") ? theme.config.layout.postRandomImg+"&" : theme.config.layout.postRandomImg+"?"}'>

    <div th:replace="~{modules/widgets/page :: page(${path},${posts},${isIndex ?: false})}"></div>
</th:block>
</html>
