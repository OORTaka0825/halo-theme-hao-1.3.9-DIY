<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="post-list"
          th:with='postItems=${posts.items},
          /* 核心：如果外部没传path，自动根据当前页面类型获取路径 */
          finalPath = ${path ?: (category != null ? category.status.permalink : (tag != null ? tag.status.permalink : (isIndex ? "/" : "")) )},
          postRandomImg=${#strings.contains(theme.config.layout.postRandomImg,"?") ? theme.config.layout.postRandomImg+"&" : theme.config.layout.postRandomImg+"?"}'>

    <div th:replace="~{modules/widgets/page :: page(${finalPath},${posts},${isIndex ?: false})}"></div>
</th:block>
</html>
